<!doctype html>
<html>
  <body>
    <h1>Snake</h1>

    <canvas
      id="canvas"
      width="400"
      height="400"
      style="border: 1px solid #000000"
    >
      Sorry, your browser does not support canvas.
    </canvas>

    <script>
      const snake = [
        { x: 187, y: 187 },
        { x: 162, y: 187 },
        { x: 137, y: 187 },
      ];

      function draw() {
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "green";
        snake.forEach((segment) => {
          ctx.fillRect(segment.x, segment.y, 25, 25);
        });
      }

      document.addEventListener("keydown", (e) => {
        const head = { ...snake[0] };

        if (e.key === "w") head.y -= 25;
        if (e.key === "a") head.x -= 25;
        if (e.key === "s") head.y += 25;
        if (e.key === "d") head.x += 25;

        snake.unshift(head);
        snake.pop();
        draw();
      });

      draw();
    </script>
  </body>
</html>
