<!doctype html>
<html>
  <body>
    <h1>Snake</h1>

    <canvas
      id="canvas"
      width="400"
      height="400"
      style="border: 1px solid #000000"
    >
      Sorry, your browser does not support canvas.
    </canvas>

    <script>
      const snake = [
        { x: 175, y: 175 },
        { x: 150, y: 175 },
        { x: 125, y: 175 },
      ];

      function draw() {
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "green";
        snake.forEach((segment) => {
          ctx.fillRect(segment.x, segment.y, 25, 25);
        });
      }

      document.addEventListener("keydown", (e) => {
        const head = { ...snake[0] };

        if (e.key === "w") head.y -= 25;
        if (e.key === "a") head.x -= 25;
        if (e.key === "s") head.y += 25;
        if (e.key === "d") head.x += 25;

        // wrap around edges
        if (head.x >= 400) head.x = 0;
        if (head.x < 0) head.x = 375;
        if (head.y >= 400) head.y = 0;
        if (head.y < 0) head.y = 375;

        // ignore if new head hits any segment
        const hitSelf = snake.some(
          (seg) => seg.x === head.x && seg.y === head.y,
        );
        if (hitSelf) return;

        snake.unshift(head);
        snake.pop();
        draw();
      });

      draw();
    </script>
  </body>
</html>
