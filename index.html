<!doctype html>
<html>
  <body>
    <h1>Snake</h1>

    <canvas
      id="canvas"
      width="400"
      height="400"
      style="border: 1px solid #000000"
    >
      Sorry, your browser does not support canvas.
    </canvas>

    <script>
      let snake = [
        { x: 175, y: 175 },
        { x: 150, y: 175 },
        { x: 125, y: 175 },
      ];
      let food = randomFood();
      let direction = "d";
      let gameOver = false;
      let score = 0;
      let powerUp = null;
      let speedBoostActive = false;
      let speedBoostStartTime = 0;
      let intervalTime = 150;
      let intervalId = setInterval(tick, intervalTime);

      function draw() {
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.font = "20px Arial";
        ctx.fillStyle = "black";
        ctx.fillText("Score: " + score, 10, 20);

        if (gameOver) {
          ctx.fillStyle = "red";
          ctx.font = "30px Arial";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2);
          return;
        }

        ctx.fillStyle = "red";
        ctx.fillRect(food.x, food.y, 25, 25);

        if (powerUp) {
          ctx.fillStyle = "yellow";
          ctx.fillRect(powerUp.x, powerUp.y, 25, 25);
        }

        ctx.fillStyle = "purple";
        snake.forEach((segment) => {
          ctx.fillRect(segment.x, segment.y, 25, 25);
        });
      }

      function tick() {
        if (gameOver) {
          draw();
          return;
        }

        if (speedBoostActive) {
          const currentTime = Date.now();
          if (currentTime - speedBoostStartTime >= 5000) {
            speedBoostActive = false;
            intervalTime = 150;
            clearInterval(intervalId);
            intervalId = setInterval(tick, intervalTime);
          }
        }

        const head = { ...snake[0] };

        if (direction === "w") head.y -= 25;
        if (direction === "a") head.x -= 25;
        if (direction === "s") head.y += 25;
        if (direction === "d") head.x += 25;

        if (head.x >= 400) head.x = 0;
        if (head.x < 0) head.x = 375;
        if (head.y >= 400) head.y = 0;
        if (head.y < 0) head.y = 375;

        const hitSelf = snake.some(
          (seg) => seg.x === head.x && seg.y === head.y,
        );
        if (hitSelf) {
          gameOver = true;
          draw();
          return;
        }

        if (powerUp && head.x === powerUp.x && head.y === powerUp.y) {
          activateSpeedBoost();
          powerUp = null;
        }

        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
          const chance = Math.random();
          if (chance < 0.2) {
            powerUp = randomPowerUp();
          } else {
            food = randomFood();
          }
          score++;
        } else {
          snake.pop();
        }
        draw();
      }

      function activateSpeedBoost() {
        speedBoostActive = true;
        speedBoostStartTime = Date.now();
        intervalTime = 75;
        clearInterval(intervalId);
        intervalId = setInterval(tick, intervalTime);
      }

      function randomFood() {
        const x = Math.floor(Math.random() * 16) * 25;
        const y = Math.floor(Math.random() * 16) * 25;
        return { x, y };
      }

      function randomPowerUp() {
        let x, y;
        do {
          x = Math.floor(Math.random() * 16) * 25;
          y = Math.floor(Math.random() * 16) * 25;
        } while (isPositionOccupied(x, y));
        return { x, y };
      }

      function isPositionOccupied(x, y) {
        return snake.some(seg => seg.x === x && seg.y === y) || (food && food.x === x && food.y === y);
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "w") direction = "w";
        if (e.key === "a") direction = "a";
        if (e.key === "s") direction = "s";
        if (e.key === "d") direction = "d";
      });

      window.getGameState = function () {
        return { snake, food, gameOver, score, powerUp, speedBoostActive };
      };

      window.setGameState = function (newSnake, newFood, newDirection, newPowerUp, newSpeedBoostActive) {
        snake = newSnake;
        food = newFood;
        direction = newDirection;
        powerUp = newPowerUp;
        speedBoostActive = newSpeedBoostActive;
        draw();
      };
    </script>
  </body>
</html>
