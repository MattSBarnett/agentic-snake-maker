<!doctype html>
<html>
  <body>
    <h1>Snake</h1>

    <canvas
      id="canvas"
      width="400"
      height="400"
      style="border: 1px solid #000000"
    >
      Sorry, your browser does not support canvas.
    </canvas>

    <script>
      let snake = [
        { x: 175, y: 175 },
        { x: 150, y: 175 },
        { x: 125, y: 175 },
      ];
      let food = randomFood();
      let direction = "d";

      function draw() {
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "red";
        ctx.fillRect(food.x, food.y, 25, 25);

        ctx.fillStyle = "green";
        snake.forEach((segment) => {
          ctx.fillRect(segment.x, segment.y, 25, 25);
        });
      }

      function tick() {
        const head = { ...snake[0] };

        if (direction === "w") head.y -= 25;
        if (direction === "a") head.x -= 25;
        if (direction === "s") head.y += 25;
        if (direction === "d") head.x += 25;

        if (head.x >= 400) head.x = 0;
        if (head.x < 0) head.x = 375;
        if (head.y >= 400) head.y = 0;
        if (head.y < 0) head.y = 375;

        const hitSelf = snake.some(
          (seg) => seg.x === head.x && seg.y === head.y,
        );
        if (hitSelf) return;

        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
          food = randomFood();
        } else {
          snake.pop();
        }
        draw();
      }

      function randomFood() {
        const x = Math.floor(Math.random() * 16) * 25;
        const y = Math.floor(Math.random() * 16) * 25;
        return { x, y };
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "w") direction = "w";
        if (e.key === "a") direction = "a";
        if (e.key === "s") direction = "s";
        if (e.key === "d") direction = "d";
      });

      setInterval(tick, 150);

      window.getGameState = function () {
        return { snake, food };
      };

      window.setGameState = function (newSnake, newFood, newDirection) {
        snake = newSnake;
        food = newFood;
        direction = newDirection;
      };
    </script>
  </body>
</html>
