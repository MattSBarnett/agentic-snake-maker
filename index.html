<!doctype html>
<html>
  <body>
    <h1>Snake</h1>

    <canvas
      id="canvas"
      width="400"
      height="400"
      style="border: 1px solid #000000"
    >
      Sorry, your browser does not support canvas.
    </canvas>

    <script>
      const snakePosition = { x: 187, y: 187 };
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "green";
      ctx.fillRect(snakePosition["x"], snakePosition["y"], 25, 25);
    </script>
  </body>
</html>
